<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_name }}</title>
</head>
<body>
    <h1>{{ app_name }}</h1>
    <p>{{ message }}</p>

    <h2>Zoznam taskov</h2>

    <ul>
        {% for task in tasks %}
            <li>
                <strong>Nazov:</strong> {{ task.title }}<br>
                <strong>Popis:</strong> {{ task.description }}<br>
                <strong>Stav:</strong>
                {% if task.done %}
                    Hotovo
                {% else %}
                    Nehotovo
                {% endif %}
            </li>
            <hr>
        {% empty %}
            <li>Zatial nie su ziadne tasky.</li>
        {% endfor %}
    </ul>
</body>
</html>
